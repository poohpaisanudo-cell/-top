<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Workshop #6: Dark Management</title> 
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style> 
        :root {
            --bg-main: #0f172a; --bg-card: #1e293b;
            --accent-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --danger: #fb7185; --success: #4ade80; --warning: #f59e0b;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main); color: var(--text-primary);
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        } 
        .container { 
            width: 90%; max-width: 520px; padding: 2.5rem; 
            background: var(--bg-card); border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        } 
        h2 { 
            margin-top: 0; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        input.form-control, select.form-control {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            background: rgba(15, 23, 42, 0.5); color: white; border: 1px solid #334155;
            box-sizing: border-box; outline: none; font-family: inherit;
        }
        input.form-control:focus, select.form-control:focus { border-color: #818cf8; }
        .upload-area {
            background: rgba(15, 23, 42, 0.5); padding: 24px; border-radius: 16px;
            border: 2px dashed #334155; text-align: center; margin-bottom: 24px; transition: border-color 0.3s;
        }
        .upload-area:hover { border-color: #818cf8; }
        input[type="file"] { display: block; width: 100%; margin-bottom: 15px; color: var(--text-secondary); font-size: 0.85rem; }
        button { font-family: inherit; font-weight: 600; cursor: pointer; border-radius: 12px; border: none; transition: all 0.3s ease; }
        .btn-main { 
            width: 100%; padding: 14px; background: var(--accent-gradient); color: white; 
            font-size: 1rem; box-shadow: 0 10px 15px -3px rgba(94, 109, 244, 0.3);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 20px -3px rgba(80, 96, 242, 0.4); }
        .btn-delete { background: rgba(135, 31, 46, 0.1); color: var(--danger); padding: 8px 16px; font-size: 0.8rem; }
        .btn-delete:hover { background: var(--danger); color: white; }
        .btn-block { background: rgba(245, 158, 11, 0.1); color: var(--warning); padding: 8px 16px; font-size: 0.8rem; }
        .btn-block:hover { background: var(--warning); color: white; }
        #previewContainer img { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1); }
        ul { list-style: none; padding: 0; margin-top: 20px; } 
        li { 
            margin-bottom: 10px; padding: 14px; background: rgba(255, 255, 255, 0.03); 
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.05);
        } 
        .file-link { color: var(--text-primary); text-decoration: none; font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; display: inline-block; vertical-align: middle; }
        .file-link:hover { color: #818cf8; }
        .owner-badge { background: rgba(192, 132, 252, 0.2); color: #c084fc; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; margin-right: 10px; font-weight: bold; border: 1px solid rgba(192, 132, 252, 0.3);}
        #uploadStatus { font-size: 0.8rem; margin-top: 12px; text-align: center; }
        .link-text { color: #c084fc; text-decoration: none; font-weight: 600; cursor: pointer; }
        .link-text:hover { text-decoration: underline; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style> 
</head> 
<body> 
    
    <div class="container" id="loginScreen">
        <h2>🔒 Login to Cloud Drive</h2>
        <input type="text" id="username" class="form-control" placeholder="Username (เช่น user1, admin)">
        <input type="password" id="password" class="form-control" placeholder="Password">
        <button class="btn-main" onclick="handleLogin()">Sign In</button>
        <p id="loginError" style="color: var(--danger); font-size: 0.85rem; text-align: center; display: none; margin-top: 15px;"></p>
        <p style="text-align: center; font-size: 0.85rem; margin-top: 20px; color: var(--text-secondary);">
            ยังไม่มีบัญชี? <span class="link-text" onclick="toggleAuthScreen('register')">สมัครสมาชิก</span>
        </p>
    </div>

    <div class="container" id="registerScreen" style="display: none;">
        <h2>📝 Create Account</h2>
        <input type="text" id="regUsername" class="form-control" placeholder="ตั้งชื่อ Username ใหม่">
        <input type="password" id="regPassword" class="form-control" placeholder="ตั้งรหัสผ่าน Password">
        <button class="btn-main" onclick="handleRegister()">Sign Up</button>
        <p id="regError" style="color: var(--danger); font-size: 0.85rem; text-align: center; display: none; margin-top: 15px;"></p>
        <p style="text-align: center; font-size: 0.85rem; margin-top: 20px; color: var(--text-secondary);">
            มีบัญชีอยู่แล้ว? <span class="link-text" onclick="toggleAuthScreen('login')">เข้าสู่ระบบที่นี่</span>
        </p>
    </div>

    <div class="container" id="appScreen" style="display: none;">
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 0.9rem; font-weight: 600;">👤 ผู้ใช้งาน: <span id="displayUser" style="color: #c084fc;"></span></span>
            <button onclick="handleLogout()" style="background: transparent; color: var(--text-secondary); border: 1px solid #334155; padding: 6px 12px; border-radius: 8px;">Logout</button>
        </div>

        <h2>🚀 Cloud Drive Lite</h2> 
        
        <div id="adminPanel" style="display: none; background: rgba(251, 113, 133, 0.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(251, 113, 133, 0.3);">
            <h3 style="margin-top: 0; font-size: 1rem; color: var(--danger);">👑 Admin: User Management</h3>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">จัดการบัญชีผู้ใช้งาน (Block ระงับสิทธิ์ / Delete ลบทิ้ง):</p>
            <div style="display: flex; gap: 8px;">
                <select id="userToBan" class="form-control" style="margin-bottom: 0;">
                    <option value="">กำลังโหลดรายชื่อ...</option>
                </select>
                <button class="btn-block" onclick="toggleBlockUser()" style="white-space: nowrap;">Block 🔒</button>
                <button class="btn-delete" onclick="banUser()" style="white-space: nowrap;">Delete 🚫</button>
            </div>
        </div>
        
        <div class="upload-area">
            <input type="file" id="fileInput" onchange="previewFile()"> 
            <div id="previewContainer"></div> 
            <button class="btn-main" onclick="uploadFile()">Upload Now</button> 
            <progress id="uploadProgress" value="0" max="100" style="width: 50%; margin-top: 10px; accent-color: #c084fc;"></progress>
            <button id="cancelButton" class="btn-secondary" onclick="cancelUpload()" style="background-color: #f50025; display: none; color: white; padding: 5px 10px; margin-left: 10px;">&times; ยกเลิก</button>
            <p id="uploadStatus"></p> 
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 0.9rem; font-weight: 600;">Files</span>
            <span style="font-size: 0.75rem; color: var(--text-secondary);" id="fileCount">0 items</span>
        </div>
        <ul id="fileList"></ul> 
    </div> 

    <script> 
        const serverUrl = window.location.origin;
        let uploadController = null; 
               
        function toggleAuthScreen(screen) {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
            
            if (screen === 'login') {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('registerScreen').style.display = 'none';
            } else {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'block';
            }
        }

        function checkLoginState() {
            const loggedInUser = localStorage.getItem('currentUser');
            if (loggedInUser) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                document.getElementById('displayUser').textContent = loggedInUser;
                loadFileList();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('registerScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'none';
            }
        }

        async function handleRegister() {
            const user = document.getElementById('regUsername').value.trim();
            const pass = document.getElementById('regPassword').value.trim();
            const errorText = document.getElementById('regError');

            if (!user || !pass) {
                errorText.textContent = "กรุณากรอก Username และ Password ให้ครบถ้วน";
                errorText.style.display = 'block';
                return;
            }

            try {
                const res = await axios.post(`${serverUrl}/register`, { username: user, password: pass });
                alert('✅ สมัครสมาชิกสำเร็จ! คุณสามารถเข้าสู่ระบบได้เลย');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                toggleAuthScreen('login');
                document.getElementById('username').value = user;
                document.getElementById('password').focus();
            } catch (err) {
                errorText.textContent = err.response?.data?.error || "เกิดข้อผิดพลาดในการเชื่อมต่อ";
                errorText.style.display = 'block';
            }
        }

        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorText = document.getElementById('loginError');

        try {
            const res = await axios.post(`${serverUrl}/login`, { username: user, password: pass });
            localStorage.setItem('currentUser', res.data.username); 
            localStorage.setItem('currentRole', res.data.role); // 🌟 เพิ่มบรรทัดนี้เข้ามา!
            errorText.style.display = 'none';
        checkLoginState(); 
        } catch (err) {
                // แสดงผล error ตรงๆ จากเซิร์ฟเวอร์ เช่นข้อความโดนบล็อก
                errorText.textContent = err.response?.data?.error || "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้";
                errorText.style.display = 'block';
            }
        }

        function handleLogout() {
            localStorage.removeItem('currentUser'); 
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            checkLoginState();
        }

        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = ''; 
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => { previewContainer.innerHTML = `<img src="${e.target.result}">`; }
                reader.readAsDataURL(file);
            } else if (file) {
                previewContainer.innerHTML = `<p style="color: var(--text-secondary); font-size: 0.8rem;">📄 ${file.name}</p>`;
            }
        }

        async function uploadFile() { 
            const file = document.getElementById('fileInput').files[0]; 
            const currentUser = localStorage.getItem('currentUser'); 

            if (!file) return alert("กรุณาเลือกไฟล์ก่อนอัปโหลด");

            const formData = new FormData(); 
            formData.append('username', currentUser); 
            formData.append('file', file); 

            const progressBar = document.getElementById('uploadProgress');
            const statusEl = document.getElementById('uploadStatus');
            const cancelBtn = document.getElementById('cancelButton'); 

            progressBar.value = 0;
            statusEl.textContent = '0%';
            statusEl.style.color = 'var(--text-secondary)';
            cancelBtn.style.display = 'inline-block'; 

            uploadController = new AbortController();

            try {
                const response = await axios.post(`${serverUrl}/upload`, formData, {
                    signal: uploadController.signal,
                    onUploadProgress: (progressEvent) => {
                        if (progressEvent.lengthComputable) {
                            const percentComplete = Math.round((progressEvent.loaded * 100) / progressEvent.total);
                            progressBar.value = percentComplete;
                            statusEl.textContent = percentComplete + '%';
                        }
                    }
                });

                statusEl.textContent = 'Uploaded successfully!';
                statusEl.style.color = 'var(--success)';
                progressBar.value = 100;
                document.getElementById('previewContainer').innerHTML = '';
                document.getElementById('fileInput').value = '';
                cancelBtn.style.display = 'none'; 
                loadFileList();
                
                setTimeout(() => { statusEl.textContent = ''; progressBar.value = 0; }, 3000);

            } catch (error) {
                if (axios.isCancel(error)) {
                    statusEl.textContent = '❌ Upload canceled';
                    statusEl.style.color = 'var(--danger)';
                } else {
                    statusEl.textContent = '❌ Upload failed: ' + error.message;
                    statusEl.style.color = 'var(--danger)';
                }
                progressBar.value = 0;
                cancelBtn.style.display = 'none';
                setTimeout(() => { statusEl.textContent = ''; }, 3000);
            } finally {
                uploadController = null; 
            }
        }

        function cancelUpload() {
            if (uploadController) {
                uploadController.abort(); 
            }
        }
         
     // 🌟 แยกฟังก์ชันดึงรายชื่อ User ออกมาให้เป็นระเบียบ
        function loadUserList() {
            const currentUser = localStorage.getItem('currentUser');
            fetch(`${serverUrl}/users?user=${currentUser}`) // ดึงข้อมูลโดยอ้างอิง User ที่ล็อกอินอยู่
                .then(res => res.json())
                .then(users => {
                    const select = document.getElementById('userToBan');
                    select.innerHTML = '<option value="">เลือก User ที่ต้องการจัดการ...</option>';
                    users.forEach(u => {
                        const statusText = u.status === 'Delete' ? '🔴 Delete' : '🟢 Active';
                        select.innerHTML += `<option value="${u.username}">👤 ${u.username} (${statusText})</option>`;
                    });
                })
                .catch(err => console.error("โหลดรายชื่อผู้ใช้ไม่สำเร็จ:", err));
        }

        function loadFileList() { 
            const currentUser = localStorage.getItem('currentUser');
            const currentRole = localStorage.getItem('currentRole'); 
            const adminPanel = document.getElementById('adminPanel');
            
            // 1. จัดการแผงควบคุม Admin
            if (currentRole === 'admin') { 
                adminPanel.style.display = 'block';
                loadUserList(); // เรียกใช้ฟังก์ชันที่แยกไว้ด้านบน
            } else {
                adminPanel.style.display = 'none';
            }

            // 2. จัดการรายการไฟล์
            fetch(`${serverUrl}/files?user=${currentUser}`) 
                .then(res => res.json()) 
                .then(files => { 
                    const fileList = document.getElementById('fileList'); 
                    document.getElementById('fileCount').textContent = `${files.length} items`;
                    fileList.innerHTML = files.length ? '' : '<p style="color:var(--text-secondary); font-size:0.8rem; text-align:center;">ไม่มีไฟล์ในระบบ</p>'; 
                    
                    files.forEach(file => { 
                        const nameParts = file.split('-');
                        const fileOwner = nameParts[0]; 
                        const displayName = nameParts.length >= 3 ? nameParts.slice(2).join('-') : file;

                        let badgeHtml = '';
                        if (currentRole === 'admin') { // 🌟 แก้เป็นเช็คจาก Role แทน
                            badgeHtml = `<span class="owner-badge">👤 ${fileOwner}</span>`;
                        }

                        const li = document.createElement('li'); 
                        li.innerHTML = `
                            <div style="display: flex; align-items: center; width: 75%; overflow: hidden;">
                                ${badgeHtml}
                                <a class="file-link" href="${serverUrl}/download/${encodeURIComponent(file)}" download title="${file}">${displayName}</a>
                            </div>
                            <button class="btn-delete" onclick="deleteFile('${encodeURIComponent(file)}')">Delete</button>
                        `; 
                        fileList.appendChild(li); 
                    });
                }); 
        }

        function deleteFile(filename) {
            const currentUser = localStorage.getItem('currentUser');
            if (confirm(`คุณต้องการลบไฟล์นี้ใช่หรือไม่?`)) {
                fetch(`${serverUrl}/delete/${filename}?user=${currentUser}`, { method: 'DELETE' })
                    .then(async (res) => {
                        if (!res.ok) throw new Error((await res.json()).error);
                        return res.json();
                    })
                    .then(() => loadFileList())
                    .catch(err => alert(err.message));
            }
        }

        // ฟังก์ชันใหม่: ระงับสิทธิ์ (Block / Unblock)
        function toggleBlockUser() {
            const targetUser = document.getElementById('userToBan').value;
            const currentUser = localStorage.getItem('currentUser');

            if (!targetUser) return alert('กรุณาเลือก User ที่ต้องการจัดการ');

            if (confirm(`คุณต้องการ "สลับสถานะ (Block/Unblock)" บัญชีของ ${targetUser} ใช่หรือไม่?`)) {
                // ยิง API แบบ PUT ไปสลับสถานะ
                axios.put(`${serverUrl}/users/${targetUser}/toggle-block?user=${currentUser}`)
                    .then((res) => {
                        alert(`✅ ${res.data.message}`);
                        loadFileList(); // รีเฟรชรายชื่อใน Dropdown
                    })
                    .catch(err => alert("เกิดข้อผิดพลาด: " + (err.response?.data?.error || err.message)));
            }
        }

        function banUser() {
            const targetUser = document.getElementById('userToBan').value;
            const currentUser = localStorage.getItem('currentUser');

            if (!targetUser) return alert('กรุณาเลือก User ที่ต้องการจัดการ');

            if (confirm(`⚠️ คำเตือน!\nคุณแน่ใจหรือไม่ที่จะ "ลบบัญชี ${targetUser}" และไฟล์ทั้งหมด?\n(การกระทำนี้ไม่สามารถกู้คืนได้)`)) {
                fetch(`${serverUrl}/users/${targetUser}?user=${currentUser}`, { method: 'DELETE' })
                    .then(async (res) => {
                        if (!res.ok) throw new Error((await res.json()).error);
                        return res.json();
                    })
                    .then((data) => {
                        alert(`✅ สำเร็จ: ${data.message}`);
                        loadFileList(); 
                    })
                    .catch(err => alert("เกิดข้อผิดพลาด: " + err.message));
            }
        }

        checkLoginState(); 
    </script> 
</body> 
</html>
